<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="160" height="16">
  <!-- NeXT restore button; glyph = two overlapped square outlines. -->

  <g id="restore" transform="translate(0,0)">
    <rect x="0" y="0" width="18" height="16" fill="#000000" fill-opacity="0"/>
    <rect x="0" y="0" width="18" height="16" fill="#cfd3d9"/>
    <rect x="1" y="1" width="16" height="14" fill="#3b4048"/>
    <rect x="1" y="1" width="16" height="1"  fill="#565d67"/>
    <rect x="1" y="1" width="1"  height="14" fill="#565d67"/>
    <rect x="1" y="14" width="16" height="1" fill="#14161a"/>
    <rect x="16" y="1" width="1" height="14" fill="#14161a"/>
    <rect x="6" y="3" width="7" height="7" fill="#3b4048" stroke="#000000" stroke-width="1.3"/>
    <rect x="4" y="6" width="7" height="7" fill="#3b4048" stroke="#000000" stroke-width="1.3"/>
  </g>

  <g id="active" transform="translate(22,0)">
    <rect x="0" y="0" width="18" height="16" fill="#000000" fill-opacity="0"/>
    <rect x="0" y="0" width="18" height="16" fill="#cfd3d9"/>
    <rect x="1" y="1" width="16" height="14" fill="#3b4048"/>
    <rect x="1" y="1" width="16" height="1"  fill="#565d67"/>
    <rect x="1" y="1" width="1"  height="14" fill="#565d67"/>
    <rect x="1" y="14" width="16" height="1" fill="#14161a"/>
    <rect x="16" y="1" width="1" height="14" fill="#14161a"/>
    <rect x="6" y="3" width="7" height="7" fill="#3b4048" stroke="#000000" stroke-width="1.3"/>
    <rect x="4" y="6" width="7" height="7" fill="#3b4048" stroke="#000000" stroke-width="1.3"/>
  </g>

  <g id="hover" transform="translate(44,0)">
    <rect x="0" y="0" width="18" height="16" fill="#000000" fill-opacity="0"/>
    <rect x="0" y="0" width="18" height="16" fill="#cfd3d9"/>
    <rect x="1" y="1" width="16" height="14" fill="#454b54"/>
    <rect x="1" y="1" width="16" height="1"  fill="#565d67"/>
    <rect x="1" y="1" width="1"  height="14" fill="#565d67"/>
    <rect x="1" y="14" width="16" height="1" fill="#14161a"/>
    <rect x="16" y="1" width="1" height="14" fill="#14161a"/>
    <rect x="6" y="3" width="7" height="7" fill="#454b54" stroke="#000000" stroke-width="1.3"/>
    <rect x="4" y="6" width="7" height="7" fill="#454b54" stroke="#000000" stroke-width="1.3"/>
  </g>

  <g id="pressed" transform="translate(66,0)">
    <rect x="0" y="0" width="18" height="16" fill="#000000" fill-opacity="0"/>
    <rect x="0" y="0" width="18" height="16" fill="#cfd3d9"/>
    <rect x="1" y="1" width="16" height="14" fill="#2c3138"/>
    <rect x="1" y="1" width="16" height="1"  fill="#14161a"/>
    <rect x="1" y="1" width="1"  height="14" fill="#14161a"/>
    <rect x="1" y="14" width="16" height="1" fill="#565d67"/>
    <rect x="16" y="1" width="1" height="14" fill="#565d67"/>
    <rect x="7" y="4" width="7" height="7" fill="#2c3138" stroke="#000000" stroke-width="1.3"/>
    <rect x="5" y="7" width="7" height="7" fill="#2c3138" stroke="#000000" stroke-width="1.3"/>
  </g>

  <g id="inactive" transform="translate(88,0)">
    <rect x="0" y="0" width="18" height="16" fill="#000000" fill-opacity="0"/>
    <rect x="0" y="0" width="18" height="16" fill="#2a2a2a"/>
    <rect x="1" y="1" width="16" height="14" fill="#a8a8a8"/>
    <rect x="1" y="1" width="16" height="1"  fill="#e6e6e6"/>
    <rect x="1" y="1" width="1"  height="14" fill="#e6e6e6"/>
    <rect x="1" y="14" width="16" height="1" fill="#8a8a8a"/>
    <rect x="16" y="1" width="1" height="14" fill="#8a8a8a"/>
    <rect x="6" y="3" width="7" height="7" fill="#a8a8a8" stroke="#555555" stroke-width="1.3"/>
    <rect x="4" y="6" width="7" height="7" fill="#a8a8a8" stroke="#555555" stroke-width="1.3"/>
  </g>

  <g id="deactivated" transform="translate(110,0)">
    <rect x="0" y="0" width="18" height="16" fill="#000000" fill-opacity="0"/>
    <rect x="0" y="0" width="18" height="16" fill="#2a2a2a"/>
    <rect x="1" y="1" width="16" height="14" fill="#a8a8a8"/>
    <rect x="1" y="1" width="16" height="1"  fill="#e6e6e6"/>
    <rect x="1" y="1" width="1"  height="14" fill="#e6e6e6"/>
    <rect x="1" y="14" width="16" height="1" fill="#8a8a8a"/>
    <rect x="16" y="1" width="1" height="14" fill="#8a8a8a"/>
    <rect x="6" y="3" width="7" height="7" fill="#a8a8a8" stroke="#777777" stroke-width="1.3"/>
    <rect x="4" y="6" width="7" height="7" fill="#a8a8a8" stroke="#777777" stroke-width="1.3"/>
  </g>
</svg>

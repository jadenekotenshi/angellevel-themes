# AngelLevel — rEFInd boot theme (visually coherent with the AngelLevel
# Plasma theme). Enable by adding this line to /EFI/refind/refind.conf:
#   include themes/AngelLevel/theme.conf

banner          themes/AngelLevel/background.png
banner_scale    fillscreen

selection_big   themes/AngelLevel/selection_big.png
selection_small themes/AngelLevel/selection_small.png

icons_dir       themes/AngelLevel/icons
big_icon_size   128
small_icon_size 48

# cleaner NeXT-style menu
hideui          hints

# SquirrelLevel — rEFInd boot theme (visually coherent with the SquirrelLevel
# Plasma theme). Enable by adding this line to /EFI/refind/refind.conf:
#   include themes/SquirrelLevel/theme.conf

banner          themes/SquirrelLevel/background.png
banner_scale    fillscreen

selection_big   themes/SquirrelLevel/selection_big.png
selection_small themes/SquirrelLevel/selection_small.png

icons_dir       themes/SquirrelLevel/icons
big_icon_size   128
small_icon_size 48

# cleaner NeXT-style menu
hideui          hints
